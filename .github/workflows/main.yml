name: vulnerable-app-pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # STEP 1: Checkout code
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v5
        
      # -----------------------------
      # STEP 2: Setup Python  
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # -----------------------------
      # STEP 3: Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: pip install -r requirements.txt

      # -----------------------------
      # STEP 4: Install Bridge CLI
      # -----------------------------
      - name: Install Bridge CLI
        run: |
          mkdir -p $HOME/bridge-cli

          curl -fsSL https://raw.githubusercontent.com/blackducksoftware/bridge-cli/main/install.sh \
          | bash -s -- -d $HOME/bridge-cli

          echo "Bridge CLI contents:"
          ls -la $HOME/bridge-cli

      # -----------------------------
      # STEP 5: Run Polaris Scan (ONLY SECURITY STEP)
      # -----------------------------
      - name: Run Polaris Scan (Bridge CLI)
        env:
          BRIDGE_POLARIS_SERVER_URL: ${{ secrets.POLARIS_SERVER_URL }}
          BRIDGE_POLARIS_ACCESS_TOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          BRIDGE_POLARIS_APPLICATION_NAME: "vulnerable-demo-app"
          BRIDGE_POLARIS_PROJECT_NAME: "vulnerable-demo"
      run: |
        $HOME/bridge-cli/bridge

