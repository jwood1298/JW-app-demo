name: vulnerable-app-pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # STEP 1: Checkout code
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v5

      # -----------------------------
      # STEP 2: Setup Python
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # -----------------------------
      # STEP 3: Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: pip install -r requirements.txt

      # -----------------------------
      # STEP 4: Install Bridge CLI
      # -----------------------------
      - name: Install Bridge CLI
        run: |
          curl -s https://blackducksoftware.github.io/bridge-cli/install.sh | bash
          echo "$HOME/bridge-cli" >> $GITHUB_PATH

      # -----------------------------
      # STEP 5: Run Polaris Scan (ONLY SECURITY STEP)
      # -----------------------------
      - name: Run Polaris Scan (Bridge CLI)
        env:
          BRIDGE_POLARIS_SERVER_URL: ${{ secrets.POLARIS_SERVER_URL }}
          BRIDGE_POLARIS_ACCESS_TOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
        run: |
          bridge --stage polaris \
            --polaris.project.name "vulnerable-demo" \
            --polaris.application.name "vulnerable-demo-app" \
            --detect.tools=SIGNATURE_SCAN \
            --coverity.project.name "vulnerable-demo" \
            --coverity.stream.name "main"
